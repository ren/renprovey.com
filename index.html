<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ren Provey</title>

<style>
:root {
    color-scheme: light dark;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;

    font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

    line-height: 1.5;
    padding: 2rem;
}

main {
    max-width: 42rem;
}

h1 {
    font-size: clamp(2.5rem, 8vw, 4rem);
    line-height: 1;
    margin: 0 0 1rem 0;
    letter-spacing: -0.04em;
}

.tagline {
    font-size: 1.25rem;
    margin-bottom: 2rem;
    opacity: 0.8;
}

.bio {
    opacity: 0.75;
    margin-bottom: 2rem;
}

.links {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
}

a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid currentColor;
}

a:hover {
    opacity: 0.7;
}
</style>
</head>

<body>
<main>
    <h1>Ren Provey</h1>

    <p class="tagline">
        Engineering leader building software for people who make things.
    </p>

    <p class="bio">
        Interested in software, tools, woodworking, and the intersection of
        digital and physical craft.
    </p>

    <div class="links">
        <a href="mailto:ren@example.com">Email</a>
        <a href="https://linkedin.com/in/yourprofile">LinkedIn</a>
        <a href="https://github.com/yourhandle">GitHub</a>
    </div>
</main>
</body>
</html>
